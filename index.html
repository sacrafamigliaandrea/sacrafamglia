<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portale Sacra Famiglia — Web App dei Docenti</title>
<meta name="description" content="Le web app didattiche realizzate dai docenti della Scuola Sacra Famiglia di Orzinuovi.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#EE7C00;
    --orange-bright:#FF9520;
    --orange-deep:#B45309;
    --orange-soft:#FFE6CC;
    --orange-line:#F8B580;
    --orange-pale:#FFF1E0;

    --blue-deep:#1E3A5F;
    --blue:#2A4D7A;
    --blue-soft:#5B7BA0;

    --ink:#1A1310;
    --ink-soft:#5C4734;
    --paper:#FBF1E2;
    --paper-2:#FFFFFF;
    --line:#E8DDC7;

    --shadow-card:0 1px 0 rgba(45,26,13,.04), 0 8px 24px -12px rgba(45,26,13,.20);
    --shadow-card-h:0 1px 0 rgba(45,26,13,.06), 0 16px 36px -14px rgba(45,26,13,.36);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    color:var(--ink);
    background:var(--paper);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}

  /* ── BANNER ──────────────────────────────────────── */
  .banner{
    position:relative;
    width:100%;
    background:#EE7C00;
    border-bottom:3px solid var(--blue-deep);
    overflow:hidden;
    min-height:200px;
  }
  .banner-bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
  }
  .banner-content{
    position:relative;
    z-index:2;
    max-width:1320px;
    margin:0 auto;
    padding:32px 6%;
    display:flex;
    align-items:center;
    gap:24px;
  }
  .banner-logo{
    width:96px;
    height:96px;
    flex-shrink:0;
    background:#fff;
    border-radius:16px;
    padding:8px;
    box-shadow:0 14px 32px -10px rgba(30,58,95,.32),
               0 2px 6px -2px rgba(30,58,95,.18);
  }
  .banner-logo img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
  }
  .banner-text{
    display:flex;
    flex-direction:column;
    gap:8px;
    min-width:0;
  }
  .banner-title{
    margin:0;
    font-size:clamp(28px,3.6vw,46px);
    font-weight:800;
    letter-spacing:-.025em;
    line-height:1.05;
    color:var(--blue-deep);
  }
  .banner-sub{
    margin:0;
    font-size:clamp(16px,1.7vw,22px);
    font-weight:500;
    font-style:italic;
    color:var(--blue);
    line-height:1.3;
  }

  /* Globo Three.js: posizionato sopra il banner-bg (z-index:1) ma sotto il content (z-index:2) */
  .globe-svg{
    position:absolute;
    top:50%;
    right:6%;
    transform:translateY(-50%);
    width:200px;
    height:200px;
    z-index:1;
    pointer-events:none;
    filter:drop-shadow(0 0 22px rgba(255,140,60,.3));
  }

  @media (max-width:1100px){
    .globe-svg{width:150px;height:150px;right:4%}
  }
  @media (max-width:760px){
    .globe-svg{display:none}
    .banner-content{flex-direction:column;align-items:flex-start;gap:14px;padding:24px 22px}
    .banner-logo{width:72px;height:72px;padding:6px;border-radius:12px}
  }

/* ── GRIGLIA CARD COLLEGHI ──────────────────────── */
  .colleghi-wrap{
    max-width:1320px;
    margin:0 auto;
    padding:32px 32px 60px;
  }
  .colleghi-grid{
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:22px;
  }
  @media (max-width:1100px){
    .colleghi-grid{grid-template-columns:repeat(2, minmax(0, 1fr))}
  }
  @media (max-width:760px){
    .colleghi-grid{grid-template-columns:1fr}
  }

  .collega-card{
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow:var(--shadow-card);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .collega-card:hover{
    box-shadow:var(--shadow-card-h);
    border-color:var(--orange-line);
  }
  .collega-head{
    padding:22px 24px 20px;
    background:linear-gradient(180deg, var(--paper-2) 0%, #FBF6EE 100%);
    border-bottom:2px solid var(--orange);
    border-radius:16px 16px 0 0;
  }
  .collega-name{
    margin:0;
    font-weight:700;
    font-size:26px;
    letter-spacing:-.02em;
    color:var(--blue-deep);
    line-height:1.1;
  }
  .collega-apps{
    display:flex;
    flex-direction:column;
    border-radius:0 0 16px 16px;
    overflow:hidden;
  }
  .app-row{
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 24px;
    border-top:1px dashed var(--line);
    transition:background .15s, padding-left .15s;
    cursor:pointer;
  }
  .collega-apps .app-row:first-child{border-top:none}
  .app-row:hover{
    background:var(--orange-soft);
    padding-left:28px;
  }
  .app-row-main{flex:1;min-width:0}
  .app-row-title{
    font-weight:600;
    font-size:17px;
    color:var(--ink);
    line-height:1.25;
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .app-row-desc{
    font-size:13px;
    color:var(--ink-soft);
    line-height:1.45;
    margin-top:4px;
  }
  .app-row-arrow{
    color:var(--orange);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    width:28px;
    height:28px;
    border-radius:50%;
    transition:background .15s, transform .15s;
  }
  .app-row:hover .app-row-arrow{
    background:var(--orange);
    color:#fff;
    transform:translateX(2px);
  }

  .empty{
    text-align:center;
    padding:80px 20px;
    color:var(--ink-soft);
    font-size:16px;
    grid-column:1/-1;
  }
  .empty strong{color:var(--ink);font-weight:600}

/* ── FOOTER ─────────────────────────────────────── */
  footer{
    background:#221208;
    color:rgba(255,255,255,.78);
    padding:36px 32px 28px;
    border-top:3px solid var(--orange);
  }
  .foot-inner{
    max-width:1320px;
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:30px;
    flex-wrap:wrap;
  }
  .foot-brand{
    font-size:18px;
    font-weight:700;
    color:#9DB8D9;
    letter-spacing:-.01em;
  }
  .foot-copyright{
    font-size:12px;
    opacity:.6;
  }
  @media (max-width:760px){
    footer{padding:28px 22px 22px}
    .foot-inner{flex-direction:column;align-items:flex-start;gap:14px}
  }

  @media (prefers-reduced-motion: reduce){
    .globe-svg animateTransform,
    .globe-svg animate{
      animation-play-state:paused;
    }
  }
</style>
</head>
<body>

  <!-- Globo SVG (zero dipendenze, animazione SMIL) -->
  <svg class="globe-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <!-- Sfera oceano: blu profondo con shading 3D -->
      <radialGradient id="globe-ocean" cx="0.32" cy="0.28" r="0.95">

      <!-- Maschera circolare per clippare i contenuti rotanti -->

      <!-- Glow per luci citta -->

        <feGaussianBlur stdDeviation="1.6" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Atmosfera (alone esterno) -->
    <circle cx="100" cy="100" r="98" fill="url(#globe-halo)"/>

    <!-- Sfera oceano -->
    <circle cx="100" cy="100" r="80" fill="url(#globe-ocean)"/>

    <!-- Continenti + luci citta rotanti, clippati al cerchio del globo -->

      <g>
        <animateTransform attributeName="transform" attributeType="XML"

        <g transform="translate(100 100)" fill="#FFB050" filter="url(#city-glow)">

/* ─── Render Card ─── */

function escapeHTML(s){
  return String(s||"").replace(/[&<>"']/g, function(c){
    return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];
  });
}

function renderColleghi(){
  const cont = document.getElementById("colleghi-container");
  if(!cont) return;
  cont.innerHTML = "";
  const filtered = WEBAPPS;
  if(filtered.length === 0){
    cont.innerHTML = '<div class="empty"><strong>Nessun risultato.</strong><br>Prova a modificare la ricerca.</div>';
    return;
  }
  // Group by autore
  const byAutore = new Map();
  filtered.forEach(function(a){
    if(!byAutore.has(a.autore)) byAutore.set(a.autore, []);
    byAutore.get(a.autore).push(a);
  });
  // Sort alfabetico
  const sorted = Array.from(byAutore.entries()).sort(function(a,b){
    return a[0].localeCompare(b[0], "it");
  });
  sorted.forEach(function(entry){
    const nome = entry[0];
    const apps = entry[1];
    const card = document.createElement("article");
    card.className = "collega-card";
    const appsHTML = apps.map(function(a){
      return ''
        + '<a class="app-row" href="' + escapeHTML(a.url) + '" target="_blank" rel="noopener">'
        + '  <div class="app-row-main">'
        + '    <div class="app-row-title">' + escapeHTML(a.titolo) + '</div>'
        + '    <div class="app-row-desc">' + escapeHTML(a.descrizione) + '</div>'
        + '  </div>'
        + '  <span class="app-row-arrow">'
        + '    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>'
        + '  </span>'
        + '</a>';
    }).join("");
    card.innerHTML = ''
      + '<header class="collega-head">'
      + '  <h2 class="collega-name">' + escapeHTML(nome) + '</h2>'
      + '</header>'
      + '<div class="collega-apps">' + appsHTML + '</div>';
    cont.appendChild(card);
  });
  
}

/* ─── INIT immediato delle card ─── */
renderColleghi();
