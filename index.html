<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web App dei Docenti - Sacra Famiglia Orzinuovi</title>
<meta name="description" content="Le web app didattiche realizzate dai docenti della Scuola Sacra Famiglia di Orzinuovi.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<style>
  :root{
    /* PALETTE ARANCIO */
    --orange:#EE7C00;              /* arancio del laboratorio */
    --orange-mid:#FF9520;
    --orange-bright:#FFA340;
    --orange-deep:#B45309;
    --orange-darker:#7C2D12;
    --orange-soft:#FFE6CC;          /* sfondo card hover */
    --orange-line:#F8B580;
    --orange-light:#FFD4A0;
    --orange-pale:#FFF1E0;          /* paper-bg accent */

    /* PALETTE BLU (scritte importanti: scuola + docenti) */
    --blu-deep:#0F2E5C;             /* blu profondo navy */
    --blu:#1B4480;                  /* blu medio */
    --blu-light:#5B7FB8;             /* blu chiaro per accenti */

    /* SFONDI */
    --espresso:#1F1108;
    --paper:#FBF1E2;                /* SFONDO PORTALE: pesca chiaro caldo */
    --blue-deep:#1E3A5F;            /* blu istituzionale per nomi maestre */
    --blue:#2A4D7A;                 /* blu medio */
    --blue-soft:#5B7BA0;            /* blu chiaro per dettagli */
    --paper-2:#FFFFFF;              /* card bianche */
    --line:#F0DCC0;                 /* linee/bordi caldi */

    /* TESTI */
    --ink:#1A1310;                  /* nero caldo - titoli APP */
    --ink-soft:#5C4734;             /* descrizioni */

    --shadow-card:0 1px 0 rgba(154,68,8,.04), 0 8px 24px -12px rgba(154,68,8,.18);
    --shadow-card-h:0 1px 0 rgba(154,68,8,.06), 0 16px 36px -14px rgba(154,68,8,.32);

    /* Cluster DPIA */
    --c-A-bg:#FECACA; --c-A-fg:#9F1239; --c-A-bd:#FCA5A5;
    --c-B-bg:#FED7AA; --c-B-fg:#9A3412; --c-B-bd:#FDBA74;
    --c-C-bg:#DBEAFE; --c-C-fg:#1E40AF; --c-C-bd:#93C5FD;
    --c-D-bg:#E7E5E4; --c-D-fg:#57534E; --c-D-bd:#D6D3D1;
    --c-E-bg:#D6D3D1; --c-E-fg:#1C1917; --c-E-bd:#A8A29E;
    --c-F-bg:#DCFCE7; --c-F-fg:#166534; --c-F-bd:#86EFAC;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    color:var(--ink);
    background:var(--paper);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    font-feature-settings:"ss01","cv11";
  }
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}

  /* ── BANNER ────────────────────────────────────────────── */
  .banner{
    position:relative;display:block;width:100%;
    aspect-ratio:1600/280;max-height:280px;overflow:hidden;
    background:#EE7C00;
    border-bottom:3px solid var(--blue-deep);
  }
  .banner svg.banner-bg{
    position:absolute;inset:0;width:100%;height:100%;display:block;
  }
  .globe-canvas{
    position:absolute;
    right:6%;
    top:50%;
    transform:translateY(-50%);
    width:240px;height:240px;
    z-index:1;
    pointer-events:none;
    /* alone glow per integrare con il cosmo */
    filter:drop-shadow(0 0 18px rgba(255,140,60,.25));
  }
  @media (max-width:1100px){
    .globe-canvas{width:180px;height:180px;right:4%}
  }
  @media (max-width:760px){
    .globe-canvas{display:none}
  }
  .banner-overlay{
    position:absolute;inset:0;
    display:flex;align-items:center;
    padding:0 6%;
    z-index:2;
    gap:24px;
  }
  .banner-logo{
    width:128px;height:128px;flex-shrink:0;
    background:#fff;
    border-radius:18px;
    padding:10px;
    box-shadow:0 14px 32px -10px rgba(30,58,95,.32),
               0 2px 6px -2px rgba(30,58,95,.18);
  }
  .banner-logo img{width:100%;height:100%;object-fit:contain;display:block}
  .banner-text{
    color:var(--blue-deep);
    display:flex;flex-direction:column;
    gap:0;
    line-height:1;
  }
  .banner-eyebrow{
    font-size:clamp(13px,1.2vw,16px);
    font-weight:700;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--blue-deep);
    opacity:.78;
    margin-bottom:6px;
  }
  .banner-title{
    margin:0;
    font-size:clamp(30px,4.4vw,58px);
    font-weight:800;letter-spacing:-.025em;line-height:1.02;
    color:var(--blue-deep);
  }
  .banner-sub{
    margin:8px 0 0;
    font-size:clamp(13px,1.3vw,18px);
    font-weight:500;
    color:var(--blue);
    opacity:.85;
    line-height:1.3;
  }
.banner-text p::before{
    content:"·";
    margin-right:14px;
    color:var(--blue);
    opacity:.5;
    font-weight:600;
    font-style:normal;
  }
@media (max-width:760px){
    .banner{aspect-ratio:auto;min-height:200px}
    .globe-canvas{
    position:absolute;
    right:6%;
    top:50%;
    transform:translateY(-50%);
    width:240px;height:240px;
    z-index:1;
    pointer-events:none;
    /* alone glow per integrare con il cosmo */
    filter:drop-shadow(0 0 18px rgba(255,140,60,.25));
  }
  @media (max-width:1100px){
    .globe-canvas{width:180px;height:180px;right:4%}
  }
  @media (max-width:760px){
    .globe-canvas{display:none}
  }
  .banner-overlay{padding:24px 22px;gap:16px}
    .banner-logo{width:80px;height:80px;padding:6px;border-radius:12px}
    .banner-eyebrow{letter-spacing:.24em}
  }
  @media (prefers-reduced-motion: reduce){
    .banner svg animateTransform,
    .banner svg animate{display:none}
  }

  /* ── FILTRI (solo ricerca) ─────────────────────────────── */
  .filters-wrap{
    max-width:1320px;margin:0 auto;
    padding:32px 32px 24px;
  }
  .filters{display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center;justify-content:flex-end}
  .search{
    display:flex;align-items:center;gap:8px;
    border:1px solid var(--line);background:var(--paper-2);
    border-radius:999px;padding:7px 14px;transition:border-color .15s, box-shadow .15s;
  }
  .search:focus-within{border-color:var(--orange);box-shadow:0 0 0 3px rgba(238,122,31,.15)}
  .search svg{flex-shrink:0;color:var(--ink-soft)}
  .search input{border:none;outline:none;background:transparent;font-size:14px;font-family:inherit;width:240px;color:var(--ink)}

  /* ── DPIA legenda ──────────────────────────────────────── */
  .dpia-info{
    max-width:1320px;margin:0 auto;padding:0 32px;font-size:13px;color:var(--ink-soft);
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  }
  .dpia-info .legend-pill{display:inline-flex;align-items:center;gap:6px}
  .dpia-label{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink-soft);font-weight:700}

  /* ── GRIGLIA COLLEGHI ──────────────────────────────────── */
  .colleghi-wrap{max-width:1320px;margin:0 auto;padding:24px 32px 60px}
  .colleghi-grid{
    display:grid;grid-template-columns:repeat(3, minmax(0, 1fr));gap:22px;
  }
  @media (max-width:1100px){.colleghi-grid{grid-template-columns:repeat(2, minmax(0, 1fr))}}
  @media (max-width:760px){.colleghi-grid{grid-template-columns:1fr}}

  .collega-card{
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow:var(--shadow-card);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .collega-card:hover{
    box-shadow:var(--shadow-card-h);
    border-color:var(--orange-line);
  }
  .collega-head{
    padding:22px 24px 20px;
    background:linear-gradient(180deg, var(--paper-2) 0%, var(--orange-pale) 100%);
    border-bottom:2px solid var(--orange);
    border-radius:16px 16px 0 0;
  }
  .collega-name{
    margin:0;font-weight:700;font-size:28px;letter-spacing:-.02em;
    /* NOME DOCENTE in BLU PROFONDO */
    color:var(--blue-deep);
    line-height:1.1;
  }
  .collega-apps{
    display:flex;flex-direction:column;
    border-radius:0 0 16px 16px;
    overflow:hidden;
  }
  .app-row{
    display:flex;align-items:center;gap:14px;
    padding:16px 24px;
    border-top:1px dashed var(--line);
    transition:background .15s, padding-left .15s;
    cursor:pointer;
    position:relative;
  }
  .collega-apps .app-row:first-child{border-top:none}
  .app-row:hover{background:var(--orange-soft);padding-left:28px}
  .app-row-main{flex:1;min-width:0}
  .app-row-title{
    font-weight:700;font-size:17px;
    /* TITOLO APP in NERO */
    color:var(--ink);line-height:1.25;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  }
  .app-row-desc{
    font-size:13px;color:var(--ink-soft);line-height:1.45;
    margin-top:4px;
  }
  .app-row-arrow{
    color:var(--orange);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    width:28px;height:28px;border-radius:50%;
    transition:background .15s, transform .15s;
  }
  .app-row:hover .app-row-arrow{background:var(--orange);color:#fff;transform:translateX(2px)}

  .empty{
    text-align:center;padding:80px 20px;color:var(--ink-soft);font-size:16px;
    grid-column:1/-1;
  }
  .empty strong{color:var(--ink);font-weight:600}

  /* ── DPIA BADGE + TOOLTIP ──────────────────────────────── */
  .dpia-badge{
    /* usa display:inline-block invece di inline-flex,
       così il tooltip figlio si posiziona correttamente */
    display:inline-block;
    width:22px;height:22px;line-height:19px;
    border-radius:11px;
    font-size:11px;font-weight:800;letter-spacing:.3px;
    border:1.5px solid;cursor:help;
    text-align:center;
    transition:transform .15s;
    flex-shrink:0;
    position:relative;
    /* permette al tooltip di "uscire" dal bordo */
  }
  .dpia-badge:hover{transform:scale(1.12)}
  .dpia-badge[data-cluster="A"]{background:var(--c-A-bg);color:var(--c-A-fg);border-color:var(--c-A-bd)}
  .dpia-badge[data-cluster="B"]{background:var(--c-B-bg);color:var(--c-B-fg);border-color:var(--c-B-bd)}
  .dpia-badge[data-cluster="C"]{background:var(--c-C-bg);color:var(--c-C-fg);border-color:var(--c-C-bd)}
  .dpia-badge[data-cluster="D"]{background:var(--c-D-bg);color:var(--c-D-fg);border-color:var(--c-D-bd)}
  .dpia-badge[data-cluster="E"]{background:var(--c-E-bg);color:var(--c-E-fg);border-color:var(--c-E-bd)}
  .dpia-badge[data-cluster="F"]{background:var(--c-F-bg);color:var(--c-F-fg);border-color:var(--c-F-bd)}

  /* TOOLTIP */
.dpia-tooltip::before{
    /* freccina che punta al badge */
    content:"";
    position:absolute;
    top:100%;
    left:50%;
    transform:translateX(-50%);
    width:0;height:0;
    border:6px solid transparent;
    border-top-color:#1A1310;
  }
  .dpia-tooltip-title{
    display:block;
    font-weight:800;
    font-size:13px;
    color:#86EFAC;  /* verde acceso per cluster F sicuri */
    margin-bottom:5px;
    letter-spacing:.2px;
  }
  .dpia-tooltip-body{
    display:block;
    color:rgba(255,255,255,.86);
  }
  .dpia-tooltip-meta{
    display:block;
    margin-top:9px;
    padding-top:9px;
    border-top:1px solid rgba(255,255,255,.14);
    font-size:10.5px;
    opacity:.55;
    letter-spacing:.3px;
  }
  /* visibilita' tooltip */
/* vari colori per le headline tooltip in base al cluster */
  .dpia-badge[data-cluster="A"] .dpia-tooltip-title{color:#FCA5A5}
  .dpia-badge[data-cluster="B"] .dpia-tooltip-title{color:#FDBA74}
  .dpia-badge[data-cluster="C"] .dpia-tooltip-title{color:#93C5FD}
  .dpia-badge[data-cluster="D"] .dpia-tooltip-title{color:#D6D3D1}
  .dpia-badge[data-cluster="E"] .dpia-tooltip-title{color:#A8A29E}
  .dpia-badge[data-cluster="F"] .dpia-tooltip-title{color:#86EFAC}

  /* ── FOOTER ────────────────────────────────────────────── */
  footer{
    background:var(--espresso);color:rgba(255,255,255,.78);
    padding:36px 32px 28px;border-top:3px solid var(--orange);
    margin-top:0;
  }
  .foot-inner{
    max-width:1320px;margin:0 auto;
    display:flex;justify-content:space-between;align-items:flex-end;gap:30px;flex-wrap:wrap;
  }
  .foot-brand{
    font-size:18px;font-weight:700;color:#9DB8D9;letter-spacing:-.01em;
  }
  .foot-copyright{font-size:12px;opacity:.6}
  @media (max-width:760px){
    footer{padding:28px 22px 22px}
    .foot-inner{flex-direction:column;align-items:flex-start;gap:14px}
  }

  /* ── DPIA TOOLTIP (singleton body-level) ──────────────────── */
  #dpia-tooltip{
    position:fixed;
    z-index:9999;
    background:#0F0A06;
    color:#fff;
    padding:12px 14px;
    border-radius:10px;
    width:260px;
    font-size:12.5px;
    line-height:1.5;
    pointer-events:none;
    opacity:0;
    transform:translateY(-4px);
    transition:opacity .15s ease, transform .15s ease;
    box-shadow:0 18px 40px -8px rgba(0,0,0,.5);
    border:1px solid rgba(255,255,255,.08);
  }
  #dpia-tooltip.visible{opacity:1;transform:translateY(0)}
  #dpia-tooltip .tt-head{
    display:block;
    font-weight:700;
    font-size:13px;
    color:var(--orange-bright);
    margin-bottom:4px;
    letter-spacing:.1px;
  }
  #dpia-tooltip .tt-body{
    display:block;
    color:rgba(255,255,255,.88);
  }
  #dpia-tooltip .tt-meta{
    display:block;
    margin-top:8px;
    padding-top:8px;
    border-top:1px solid rgba(255,255,255,.12);
    font-size:10.5px;
    color:rgba(255,255,255,.55);
    letter-spacing:.3px;
  }
  #dpia-tooltip::after{
    content:"";
    position:absolute;
    top:100%;
    left:50%;
    transform:translateX(-50%);
    width:0;height:0;
    border:6px solid transparent;
    border-top-color:#0F0A06;
  }
</style>
</head>

      <radialGradient id="rightGlow" cx="0.86" cy="0.5" r="0.18">

      <radialGradient id="globeFace" cx="0.35" cy="0.3" r="0.85">

<!-- Three.js per il globo terrestre -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const DPIA_FILES = [
  "DPIA_Web_App_maestre_aprile_2026_v1.0.json"
];

/* Headline del tooltip per ogni cluster DPIA — testo visibile al docente */
const CLUSTER_HEADLINES = {
  A: "App ad alto rischio - DPIA + FRIA",
  B: "App con trattamento dati personali",
  C: "App con trattamento limitato",
  D: "App certificata - Registrazione semplificata",
  E: "App esente da specifica DPIA",
  F: "App certificata - Nessuna raccolta dati"
};

/* Headline tooltip per cluster - frasi chiare e rassicuranti */
const CLUSTER_TITLE = {
  A: "Trattamento ad alto rischio",
  B: "Trattamento di dati personali",
  C: "Trattamento limitato",
  D: "Registrazione semplificata",
  E: "Esente da DPIA",
  F: "App certificata e sicura"
};
const CLUSTER_BODY_DEFAULT = {
  A: "DPIA completa, valutazione di impatto rinforzata.",
  B: "DPIA completa, dati personali trattati con misure di sicurezza.",
  C: "Registrazione DPIA per trattamento limitato.",
  D: "Registrazione semplificata applicabile.",
  E: "Esente da specifica DPIA.",
  F: "Nessun dato personale raccolto. App didattica autonoma."
};

const WEBAPPS = [
  { titolo: "I mesi dell'anno", descrizione: "Attivita' per la classe prima: scoprire e ordinare i dodici mesi dell'anno.", url: "https://mesi-classe1.neocities.org/", autore: "Maestra Ilaria" },
  { titolo: "Egizi - escape room", descrizione: "Escape room digitale sull'antico Egitto: enigmi, indizi e civilta' del Nilo.", url: "https://egizi-escape.neocities.org/", autore: "Maestra Elisa" },
  { titolo: "Animal Quest!", descrizione: "Riconoscere e classificare gli animali per gruppi e caratteristiche principali.", url: "https://classanimali.neocities.org/", autore: "Maestro Andrea" },
  { titolo: "L'ultimo bagno", descrizione: "Allenare il pensiero logico riconoscendo e completando sequenze.", url: "https://sequenze.neocities.org/", autore: "Maestra Elisa" },
  { titolo: "Decimal Quest", descrizione: "Comprendere la divisione con i numeri decimali attraverso esercizi guidati.", url: "https://decimaliperdiviso.neocities.org/", autore: "Maestro Andrea" },
  { titolo: "Ancient Egypt Quiz", descrizione: "Quiz interattivo in inglese sull'antico Egitto: lessico e civilta'.", url: "https://canva.link/eyew3e2mvycv9as", autore: "Teacher Daniela" },
  // ─── Maestra Olga ───
  { titolo: "La ruota della settimana", descrizione: "Attivita' interattiva sui giorni della settimana, realizzata con Canva.", url: "https://maestraolga.my.canva.site/c2djjkmamj1mt18y", autore: "Maestra Olga" },
  { titolo: "La rana salterina", descrizione: "Attivita' ludica con la rana protagonista, realizzata con Canva.", url: "https://maestraolga.my.canva.site/", autore: "Maestra Olga" },
];

const state = { query:"" };
let DPIA_MAP = null;
const DPIA_CLUSTERS = new Set();

function normalizeUrl(u){
  if(!u) return "";
  return u.trim().toLowerCase().replace(/\/+$/, "");
}

function escapeHTML(s){
  return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

async function loadDPIA(){
  const map = new Map();
  await Promise.all(DPIA_FILES.map(async file => {
    try {
      const r = await fetch(file, { cache:"no-store" });
      if(!r.ok) return;
      const j = await r.json();
      const info = {
        cluster: j.cluster || j.clusterAuto || "?",
        reason:  j.clusterReason || "",
        date:    j.meta && j.meta.date    || "",
        prot:    j.meta && j.meta.prot    || "",
        version: j.meta && j.meta.version || "",
        clusterName: j.meta && j.meta.name || "",
        titolare:    j.meta && j.meta.titolare    || "",
        dpo:         j.meta && j.meta.dpo         || ""
      };
      const apps = (j.meta && j.meta.clusterApps) || [];
      apps.forEach(a => {
        const u = normalizeUrl(a.url);
        if(u){
          map.set(u, info);
          DPIA_CLUSTERS.add(info.cluster);
        }
      });
    } catch(e){
      console.warn("[DPIA] Caricamento fallito:", file, e);
    }
  }));
  DPIA_MAP = map;
  applyDPIABadges();
  renderDPIALegend();
}

function applyDPIABadges(){
  if(!DPIA_MAP) return;
  document.querySelectorAll(".app-row").forEach(row => {
    const url = normalizeUrl(row.getAttribute("href"));
    const info = DPIA_MAP.get(url);
    if(!info) return;
    const titleEl = row.querySelector(".app-row-title");
    if(!titleEl || titleEl.querySelector(".dpia-badge")) return;

    const badge = document.createElement("span");
    badge.className = "dpia-badge";
    badge.dataset.cluster = info.cluster;
    badge.dataset.head    = CLUSTER_HEADLINES[info.cluster] || `Cluster ${info.cluster}`;
    badge.dataset.body    = info.reason || "";
    const metaParts = [];
    if(info.prot)    metaParts.push(`Prot. ${info.prot}`);
    if(info.date)    metaParts.push(info.date);
    if(info.version) metaParts.push(info.version);
    badge.dataset.meta = metaParts.join(" · ");
    badge.textContent = info.cluster;
    titleEl.prepend(badge);
  });
}

/* ── Tooltip singleton: hover handler ──────────────────────── */
function initDPIATooltip(){
  let tooltip = document.getElementById("dpia-tooltip");
  if(!tooltip){
    tooltip = document.createElement("div");
    tooltip.id = "dpia-tooltip";
    tooltip.innerHTML = '<span class="tt-head"></span><span class="tt-body"></span><span class="tt-meta"></span>';
    document.body.appendChild(tooltip);
  }
  const ttHead = tooltip.querySelector(".tt-head");
  const ttBody = tooltip.querySelector(".tt-body");
  const ttMeta = tooltip.querySelector(".tt-meta");

  document.addEventListener("mouseover", e => {
    const badge = e.target.closest(".dpia-badge");
    if(!badge) return;
    ttHead.textContent = badge.dataset.head || "";
    ttBody.textContent = badge.dataset.body || "";
    ttMeta.textContent = badge.dataset.meta || "";
    ttBody.style.display = badge.dataset.body ? "block" : "none";
    ttMeta.style.display = badge.dataset.meta ? "block" : "none";

    /* posiziona sopra il badge, centrato */
    const r = badge.getBoundingClientRect();
    tooltip.classList.add("visible");
    /* misura il tooltip dopo averlo reso visibile per ottenere width corretto */
    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    let left = r.left + r.width/2 - tw/2;
    let top  = r.top - th - 12;
    /* clamp ai bordi della viewport */
    const margin = 8;
    if(left < margin) left = margin;
    if(left + tw > window.innerWidth - margin) left = window.innerWidth - tw - margin;
    /* se va sotto al top, mostra sotto al badge invece che sopra */
    if(top < margin){
      top = r.bottom + 12;
      tooltip.classList.add("below");
    } else {
      tooltip.classList.remove("below");
    }
    tooltip.style.left = left + "px";
    tooltip.style.top  = top + "px";
  });

  document.addEventListener("mouseout", e => {
    const badge = e.target.closest(".dpia-badge");
    if(!badge) return;
    tooltip.classList.remove("visible");
  });

  /* nascondi al scroll per evitare tooltip "fluttuante" sganciato */
  window.addEventListener("scroll", () => {
    tooltip.classList.remove("visible");
  }, { passive: true });
}
initDPIATooltip();


function renderDPIALegend(){
  if(!DPIA_CLUSTERS.size) return;
  const wrap = document.getElementById("dpia-info");
  const span = document.getElementById("dpia-legend");
  const order = ["A","B","C","D","E","F"];
  span.innerHTML = order
    .filter(c => DPIA_CLUSTERS.has(c))
    .map(c => `<span class="legend-pill"><span class="dpia-badge" data-cluster="${c}">${c}</span> ${CLUSTER_TITLE[c] || ""}</span>`)
    .join(" &nbsp;&middot;&nbsp; ");
  wrap.style.display = "flex";
}

function getFiltered(){
  const q = state.query.trim().toLowerCase();
  return WEBAPPS.filter(a => {
    if(q){
      const blob = (a.titolo + " " + a.descrizione + " " + a.autore).toLowerCase();
      if(!blob.includes(q)) return false;
    }
    return true;
  });
}

function renderColleghi(){
  const cont = document.getElementById("colleghi-container");
  cont.innerHTML = "";
  const filtered = getFiltered();
  if(filtered.length === 0){
    cont.innerHTML = `<div class="empty"><strong>Nessun risultato.</strong><br>Prova a modificare la ricerca.</div>`;
    return;
  }
  const byAutore = new Map();
  filtered.forEach(a => {
    if(!byAutore.has(a.autore)) byAutore.set(a.autore, []);
    byAutore.get(a.autore).push(a);
  });
  [...byAutore.entries()]
    .sort((a,b) => a[0].localeCompare(b[0], "it"))
    .forEach(([nome, apps]) => {
      const card = document.createElement("article");
      card.className = "collega-card";
      const appsHTML = apps.map(a => `
        <a class="app-row" href="${a.url}" target="_blank" rel="noopener">
          <div class="app-row-main">
            <div class="app-row-title">${escapeHTML(a.titolo)}</div>
            <div class="app-row-desc">${escapeHTML(a.descrizione)}</div>
          </div>
          <span class="app-row-arrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </span>
        </a>
      `).join("");
      card.innerHTML = `
        <header class="collega-head">
          <h2 class="collega-name">${escapeHTML(nome)}</h2>
        </header>
        <div class="collega-apps">${appsHTML}</div>
      `;
      cont.appendChild(card);
    });
  applyDPIABadges();
}

document.getElementById("search-input").addEventListener("input", e => {
  state.query = e.target.value;
  renderColleghi();
});

renderColleghi();
loadDPIA();
</script>


<!-- Inizializzazione globo Three.js -->
<script>
(function initGlobe(){
  const canvas = document.getElementById('globe-canvas');
  if(!canvas || typeof THREE === 'undefined') return;

  const W = 240, H = 240;
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
  camera.position.z = 3;

  const renderer = new THREE.WebGLRenderer({
    canvas, alpha: true, antialias: true
  });
  renderer.setPixelRatio(window.devicePixelRatio || 1);
  renderer.setSize(W, H, false);

  // Gruppo terra: contiene oceano + luci, ruota insieme
  const earth = new THREE.Group();
  // tilt asse terrestre realistico (~23.4 gradi)
  earth.rotation.z = 0.41;
  scene.add(earth);

  // Sfera oceano (blu profondo come fallback se texture non carica)
  const oceanGeo = new THREE.SphereGeometry(1, 64, 64);
  const oceanMat = new THREE.MeshBasicMaterial({color: 0x0A1F3A});
  const ocean = new THREE.Mesh(oceanGeo, oceanMat);
  earth.add(ocean);

  // Caricamento texture NASA Black Marble (Earth at Night)
  // La texture include continenti scuri + luci arancio delle citta
  const loader = new THREE.TextureLoader();
  loader.setCrossOrigin('anonymous');

  // Cascata di URL: prima locale, poi CDN affidabili
  // Per usare il file locale: scarica BlackMarble da NASA SVS e mettilo
  // accanto a index.html con nome 'earth_night.jpg'
  const TEXTURE_URLS = [
    './earth_night.jpg',
    'https://cdn.jsdelivr.net/gh/turban/webgl-earth@master/images/2_no_clouds_4k_night.jpg',
    'https://threejs.org/examples/textures/planets/earth_lights_2048.png'
  ];

  function loadEarthTexture(idx){
    if(idx >= TEXTURE_URLS.length){
      console.warn('[Globe] Tutte le texture fallite, mostro solo oceano');
      return;
    }
    const url = TEXTURE_URLS[idx];
    const isLightsOnly = url.includes('earth_lights'); // ultima opzione: solo luci
    loader.load(
      url,
      function(tex){
        tex.colorSpace = THREE.SRGBColorSpace || tex.colorSpace;
        if(isLightsOnly){
          // Fallback: lights additivi sopra l'oceano blu (look del codice precedente)
          const lightsGeo = new THREE.SphereGeometry(1.002, 64, 64);
          const lightsMat = new THREE.MeshBasicMaterial({
            map: tex,
            color: 0xFF8C40,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
          });
          earth.add(new THREE.Mesh(lightsGeo, lightsMat));
        } else {
          // Black Marble completa: la uso come materiale principale dell'oceano
          // Boost saturazione + luminosita per intensificare l'arancio delle citta
          ocean.material.dispose();
          ocean.material = new THREE.MeshBasicMaterial({
            map: tex,
            color: 0xFFFFFF
          });
        }
      },
      undefined,
      function(){
        console.warn('[Globe] Texture fallita:', url, '- provo successiva');
        loadEarthTexture(idx + 1);
      }
    );
  }
  loadEarthTexture(0);

  // Atmosfera: sfera leggermente piu grande, BackSide, additive
  const haloGeo = new THREE.SphereGeometry(1.15, 32, 32);
  const haloMat = new THREE.MeshBasicMaterial({
    color: 0xFFA340,
    transparent: true,
    opacity: 0.18,
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  earth.add(halo);

  // Animation loop: rotazione veloce
  let mounted = false;
  function tick(){
    requestAnimationFrame(tick);
    earth.rotation.y += 0.022;  // ~5s per giro - rotazione veloce
    renderer.render(scene, camera);
  }
  // Doppio rAF per garantire layout completato (pattern Andrea per Three.js)
  requestAnimationFrame(function(){
    requestAnimationFrame(tick);
  });

  // Stop quando reduced-motion
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    // ferma rotazione ma renderizza una volta
    earth.rotation.y = 0;
    renderer.render(scene, camera);
    return;
  }
})();
</script>
